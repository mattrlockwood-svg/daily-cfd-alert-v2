name: Aegis EOD Daily Scan

on:
  schedule:
    # Runs at 21:15 UTC Monday-Friday (Ensures US market is closed, handles DST shifts)
    - cron: '15 21 * * 1-5'
  workflow_dispatch: # Adds a button to GitHub so you can test it manually anytime

jobs:
  run-alpha-engine:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Execute Aegis Engine
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python alpha_engine.py
